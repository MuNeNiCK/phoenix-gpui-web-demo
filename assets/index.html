<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1, user-scalable=0"
    />
    <meta name="theme-color" content="#101113" />
    <link rel="icon" href="data:," />
    <title>Collaborative Notes</title>
    <link
      data-trunk
      rel="rust"
      data-bin="elixir-gpui-web"
      data-bindgen-target="web"
      data-target-path="assets"
      data-wasm-opt="0"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #101113; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; outline: none; user-select: none; }
      #boot-status {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-content: center;
        gap: 12px;
        padding: 32px;
        color: #c1c2c5;
        background: #101113;
        font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: center;
      }
      #boot-status.error { color: #ffa8a8; }
      #boot-status small { color: #909296; }
    </style>
  </head>
  <body>
    <div id="boot-status">
      <span>Starting GPUI Web...</span>
      <small>Initializing the browser graphics adapter</small>
    </div>
  </body>
</html>
